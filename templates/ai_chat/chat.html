{% extends 'base.html' %}
{% block title %}Chat AI - Sora LMS{% endblock %}

{% block extra_css %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; }

.chat-root {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 100px);
    margin: -1rem -2rem -2rem -2rem;
    font-family: 'Outfit', sans-serif;
    position: relative;
    overflow: hidden;
}



/* ── Messages area ── */
.messages-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1rem 9rem 1rem;
    scroll-behavior: smooth;
}

.messages-scroll::-webkit-scrollbar { width: 4px; }
.messages-scroll::-webkit-scrollbar-track { background: transparent; }
.messages-scroll::-webkit-scrollbar-thumb { background: var(--sora-border); border-radius: 4px; }

.messages-inner {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}

.msg-row.user + .msg-row.ai,
.msg-row.ai + .msg-row.user {
    margin-top: 0.75rem;
}

/* ── Welcome state ── */
.welcome-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    padding: 2rem;
    animation: fadeUp 0.5s ease-out;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
}

.welcome-gem {
    width: 80px;
    height: 80px;
    border-radius: 28px;
    background: var(--sora-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 2.2rem;
    margin-bottom: 1.5rem;
    position: relative;
    box-shadow: 0 0 0 12px rgba(99,102,241,0.08), 0 0 0 24px rgba(99,102,241,0.04);
}

.welcome-gem::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 55%);
}

.welcome-heading {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
}

.welcome-sub {
    font-size: 0.9rem;
    opacity: 0.5;
    max-width: 300px;
    line-height: 1.6;
}

.suggest-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 2rem;
}

.chip {
    padding: 0.45rem 1rem;
    border-radius: 20px;
    border: 1px solid var(--sora-border);
    background: var(--sora-card);
    font-size: 0.82rem;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--sora-text);
    opacity: 0.75;
}

.chip:hover {
    border-color: var(--sora-primary);
    color: var(--sora-primary);
    opacity: 1;
    background: rgba(99,102,241,0.06);
}

/* ── Messages ── */
.msg-row {
    display: flex;
    gap: 0.625rem;
    animation: msgIn 0.25s ease-out;
}

@keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

.msg-row.user { flex-direction: row-reverse; }

.msg-ava {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    overflow: hidden;
    margin-top: 2px;
}

.msg-ava.ai-ava {
    background: var(--sora-primary);
    color: white;
    font-size: 0.9rem;
}

.msg-ava.user-ava {
    background: var(--sora-card);
    border: 1px solid var(--sora-border);
    color: var(--sora-text);
}

.msg-ava.user-ava img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.msg-bubble {
    max-width: 75%;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
}

.bubble-text {
    padding: 0.75rem 1.1rem;
    border-radius: 18px;
    font-size: 0.97rem;
    line-height: 1.65;
    word-break: break-word;
}

.msg-row.user .bubble-text {
    background: var(--sora-primary);
    color: white;
    border-bottom-right-radius: 6px;
}

.msg-row.ai .bubble-text {
    background: var(--sora-card);
    border: 1px solid var(--sora-border);
    border-bottom-left-radius: 6px;
}

.bubble-time {
    font-size: 0.7rem;
    opacity: 0.4;
    padding: 0 0.25rem;
}

.msg-row.user .bubble-time { text-align: right; }

/* ── Typing indicator ── */
.typing-row { display: flex; gap: 0.625rem; }

.typing-bubble {
    padding: 0.75rem 1rem;
    background: var(--sora-card);
    border: 1px solid var(--sora-border);
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    display: flex;
    gap: 5px;
    align-items: center;
}

.dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--sora-text);
    opacity: 0.4;
    animation: pulse 1.4s ease-in-out infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
    0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
    40% { transform: scale(1.1); opacity: 0.9; }
}

/* ── Input area ── */
.input-zone {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0.875rem 1rem 1rem 296px;
    background: var(--sora-bg);
    z-index: 50;
}

@media (max-width: 992px) {
    .input-zone { padding-left: 1rem; }
}

.input-shell {
    max-width: 680px;
    margin: 0 auto;
}

.input-box {
    background: var(--sora-card);
    border: 1.5px solid var(--sora-border);
    border-radius: 18px;
    padding: 0.625rem 0.625rem 0.625rem 1rem;
    display: flex;
    align-items: flex-end;
    gap: 0.5rem;
    transition: border-color 0.2s;
}

.input-box:focus-within {
    border-color: var(--sora-primary);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
}

#chatInput {
    flex: 1;
    border: none;
    background: transparent;
    padding: 0.3rem 0;
    resize: none;
    outline: none;
    font-size: 0.9rem;
    font-family: 'Outfit', sans-serif;
    max-height: 120px;
    color: var(--sora-text);
    line-height: 1.5;
}

#chatInput::placeholder {
    color: var(--sora-text);
    opacity: 0.35;
}

.input-actions {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    flex-shrink: 0;
}

.btn-send {
    width: 36px;
    height: 36px;
    border-radius: 11px;
    background: var(--sora-primary);
    color: white;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
    flex-shrink: 0;
}

.btn-send:disabled {
    opacity: 0.28;
    cursor: not-allowed;
}

.btn-send:not(:disabled):hover {
    transform: scale(1.08);
    box-shadow: 0 4px 12px rgba(99,102,241,0.4);
}

.input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.375rem 0.25rem 0;
}


.input-footer-left {
    display: flex;
    align-items: center;
    gap: 0.375rem;
}

.fab-btn {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    border: 1px solid var(--sora-border);
    background: var(--sora-card);
    color: var(--sora-text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.82rem;
    opacity: 0.6;
    transition: all 0.15s;
}

.fab-btn:hover {
    opacity: 1;
    border-color: var(--sora-primary);
    color: var(--sora-primary);
    background: rgba(99,102,241,0.08);
}

.fab-new:hover {
    background: var(--sora-primary);
    border-color: var(--sora-primary);
    color: white;
    opacity: 1;
}

.live-toggle {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    cursor: pointer;
    font-size: 0.78rem;
    opacity: 0.55;
    transition: opacity 0.15s;
}

.live-toggle:hover { opacity: 0.85; }

.live-toggle input[type=checkbox] { cursor: pointer; accent-color: var(--sora-primary); }

.input-hint {
    font-size: 0.72rem;
    opacity: 0.3;
}

/* ── History modal ── */
.hist-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 10000;
    backdrop-filter: blur(4px);
}

.hist-overlay.show { display: flex; animation: fadeIn 0.2s ease; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.hist-panel {
    background: var(--sora-card);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 72vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.hist-handle {
    width: 40px;
    height: 4px;
    background: var(--sora-border);
    border-radius: 2px;
    margin: 0.75rem auto 0;
}

.hist-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem 0.75rem;
}

.hist-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
}

.hist-close {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 1px solid var(--sora-border);
    background: transparent;
    cursor: pointer;
    color: var(--sora-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
}

.hist-body {
    flex: 1;
    overflow-y: auto;
    padding: 0.25rem 0.75rem 1rem;
}

.hist-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 0.75rem;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.15s;
}

.hist-item:hover { background: rgba(99,102,241,0.08); }

.hist-item.active { background: rgba(99,102,241,0.12); }

.hist-icon {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: rgba(99,102,241,0.1);
    color: var(--sora-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
}

.hist-item.active .hist-icon {
    background: var(--sora-primary);
    color: white;
}

.hist-meta { flex: 1; min-width: 0; }

.hist-name {
    font-size: 0.88rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.hist-date {
    font-size: 0.72rem;
    opacity: 0.45;
    margin-top: 1px;
}

.hist-del {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: 1px solid rgba(239,68,68,0.25);
    background: rgba(239,68,68,0.06);
    color: #ef4444;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
}

.hist-item:hover .hist-del { opacity: 1; }

.hist-new-btn {
    margin: 0 0.75rem 0.75rem;
    width: calc(100% - 1.5rem);
    padding: 0.75rem;
    border-radius: 14px;
    border: 1.5px dashed var(--sora-border);
    background: transparent;
    color: var(--sora-text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    opacity: 0.55;
    transition: all 0.15s;
}

.hist-new-btn:hover {
    opacity: 1;
    border-color: var(--sora-primary);
    color: var(--sora-primary);
    background: rgba(99,102,241,0.05);
}

/* ── Date separator ── */
.date-sep {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 1rem 0 0.5rem;
}

.date-sep::before, .date-sep::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--sora-border);
    opacity: 0.5;
}

.date-sep span {
    font-size: 0.72rem;
    opacity: 0.4;
    font-weight: 500;
    white-space: nowrap;
}

/* ── Scrollbar hide util ── */
.hist-body::-webkit-scrollbar { width: 3px; }
.hist-body::-webkit-scrollbar-thumb { background: var(--sora-border); border-radius: 3px; }

.chat-root { animation: fadeIn 0.35s ease-out; }
</style>
{% endblock %}

{% block content %}
<div class="chat-root">

    <!-- History Modal (bottom sheet) -->
    <div class="hist-overlay" id="historyModal" onclick="closeHistoryModal(event)">
        <div class="hist-panel" onclick="event.stopPropagation()">
            <div class="hist-handle"></div>
            <div class="hist-head">
                <span class="hist-title">Riwayat Chat</span>
                <button class="hist-close" onclick="closeHistoryModal()"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="hist-body" id="sessionList"></div>

        </div>
    </div>

    <!-- Messages -->
    <div class="messages-scroll" id="chatMessages">
        <div class="messages-inner" id="msgInner"></div>
    </div>

    <!-- Input -->
    <div class="input-zone">
        <div class="input-shell">
            <div class="input-box">
                <textarea id="chatInput" rows="1"
                    placeholder="Tanyakan soal, minta penjelasan, atau rangkuman…"
                    oninput="autoResize(this)"></textarea>
                <div class="input-actions">
                    <button id="sendBtn" class="btn-send" onclick="sendMessage()" disabled>
                        <i class="bi bi-arrow-up"></i>
                    </button>
                </div>
            </div>
            <div class="input-footer">
                <div class="input-footer-left">
                    <button class="fab-btn" onclick="showHistoryModal()" title="Riwayat chat">
                        <i class="bi bi-clock-history"></i>
                    </button>
                    <button class="fab-btn fab-new" onclick="newSession()" title="Chat baru">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                    <label class="live-toggle">
                        <input type="checkbox" id="liveDataCheck">
                        <span>Data terbaru</span>
                    </label>
                </div>
                <span class="input-hint">Enter kirim · Shift+Enter baris baru</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const USER_ID = "{{ request.user.pk }}";
const STORAGE_KEY = `sora_ai_v2_${USER_ID}`;

let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let currentId = localStorage.getItem(STORAGE_KEY + '_current') || null;
const USER_AVATAR = "{% if user.avatar %}{{ user.avatar.url }}{% else %}false{% endif %}";
const USER_NAME = "{{ user.username|escapejs }}";
const USER_INITIAL = "{{ user.username|slice:':1'|upper }}";

function init() {
    const ids = Object.keys(sessions);
    if (currentId && sessions[currentId]) {
        loadSession(currentId);
    } else if (ids.length > 0) {
        loadSession(ids.sort().reverse()[0]);
    } else {
        newSession();
    }
    renderSessionList();
}

function newSession() {
    if (Object.keys(sessions).length >= 3) {
        alert('Maksimal 3 chat history. Hapus chat lama terlebih dahulu.');
        return;
    }
    const id = 'sess_' + Date.now();
    sessions[id] = { title: 'Chat Baru', messages: [], date: new Date().toISOString() };
    save();
    loadSession(id);
    closeHistoryModal();
}

function loadSession(id) {
    currentId = id;
    localStorage.setItem(STORAGE_KEY + '_current', id);
    renderMessages();
    renderSessionList();
    closeHistoryModal();
}

function renderMessages() {
    const inner = document.getElementById('msgInner');
    const msgs = sessions[currentId]?.messages || [];

    if (!msgs.length) {
        inner.innerHTML = `
            <div class="welcome-state">
                <div class="welcome-gem"><i class="bi bi-stars"></i></div>
                <div class="welcome-heading">Ada yang bisa Sora bantu?</div>
                <div class="welcome-sub">Tanyakan soal matematika, coding, tugas, atau minta rangkuman materi.</div>
                <div class="suggest-chips">
                    <button class="chip" onclick="fillInput('Jelaskan konsep OOP dalam Python')">Jelaskan OOP Python</button>
                    <button class="chip" onclick="fillInput('Bantu saya memahami integral substitusi')">Integral substitusi</button>
                    <button class="chip" onclick="fillInput('Ringkaskan progres belajar saya')">Progres belajar saya</button>
                    <button class="chip" onclick="fillInput('Apa tugas yang harus saya selesaikan?')">Tugas pending</button>
                </div>
            </div>
        `;
        return;
    }

    inner.innerHTML = msgs.map((m, i) => {
        const isUser = m.role === 'user';
        const time = m.time ? `<div class="bubble-time">${m.time}</div>` : '';
        return `
            <div class="msg-row ${isUser ? 'user' : 'ai'}">
                <div class="msg-ava ${isUser ? 'user-ava' : 'ai-ava'}">
                    ${isUser
                        ? (USER_AVATAR !== 'false'
                            ? `<img src="${USER_AVATAR}" alt="${USER_NAME}">`
                            : USER_INITIAL)
                        : '<i class="bi bi-stars"></i>'}
                </div>
                <div class="msg-bubble">
                    <div class="bubble-text">${formatContent(m.content)}</div>
                    ${time}
                </div>
            </div>
        `;
    }).join('');

    scrollBottom();
}

function scrollBottom() {
    const el = document.getElementById('chatMessages');
    el.scrollTop = el.scrollHeight;
}

function fillInput(text) {
    const el = document.getElementById('chatInput');
    el.value = text;
    el.focus();
    autoResize(el);
    document.getElementById('sendBtn').disabled = false;
}

async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

    const sess = sessions[currentId];
    sess.messages.push({ role: 'user', content: text, time: timeStr });
    if (sess.title === 'Chat Baru') sess.title = text.substring(0, 28) + (text.length > 28 ? '…' : '');

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    renderMessages();
    save();

    // Typing indicator
    const inner = document.getElementById('msgInner');
    const typingEl = document.createElement('div');
    typingEl.className = 'typing-row';
    typingEl.innerHTML = `
        <div class="msg-ava ai-ava"><i class="bi bi-stars"></i></div>
        <div class="typing-bubble">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    `;
    inner.appendChild(typingEl);
    scrollBottom();

    let finalMessages = sess.messages;

    if (document.getElementById('liveDataCheck').checked) {
        try {
            const liveRes = await fetch('{% url "ai_chat:live_data_api" %}?type=all', {
                headers: { 'X-CSRFToken': '{{ csrf_token }}' }
            });
            const liveData = await liveRes.json();
            const dataContext = `
Catatan DATA TERBARU dari database (untuk menjawab pertanyaan pengguna secara akurat):
- Enrollment & Progres: ${JSON.stringify(liveData.data.enrollments || [])}
- Materi Selesai: ${JSON.stringify(liveData.data.completed_materials || [])}
- Pengumuman: ${JSON.stringify(liveData.data.announcements || [])}
- Quiz Scores: ${JSON.stringify(liveData.data.quiz_attempts || [])}
- Tugas: ${JSON.stringify(liveData.data.assignments || [])}
- Kursus Tersedia: ${JSON.stringify(liveData.data.available_courses || [])}
`;
            finalMessages = [{ role: 'user', content: dataContext }, ...sess.messages];
        } catch (e) {
            console.error('Live data fetch failed:', e);
        }
    }

    try {
        const response = await fetch('{% url "ai_chat:chat_api" %}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify({ messages: finalMessages })
        });
        const data = await response.json();
        typingEl.remove();
        const replyTime = new Date();
        const replyTimeStr = replyTime.getHours().toString().padStart(2,'0') + ':' + replyTime.getMinutes().toString().padStart(2,'0');
        if (data.error) {
            sess.messages.push({ role: 'assistant', content: 'Error: ' + data.error, time: replyTimeStr });
        } else {
            sess.messages.push({ role: 'assistant', content: data.reply, time: replyTimeStr });
        }
    } catch (e) {
        typingEl.remove();
        sess.messages.push({ role: 'assistant', content: 'Maaf, terjadi gangguan koneksi ke AI. Error: ' + e.message });
    }

    save();
    renderMessages();
}

function formatContent(t) {
    if (!t) return '';
    return t
        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
        .replace(/```([\s\S]*?)```/g, '<pre style="background:rgba(0,0,0,0.15);padding:0.625rem 0.875rem;border-radius:10px;margin:0.5rem 0;font-size:0.82rem;overflow-x:auto;"><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.1);padding:1px 5px;border-radius:4px;font-size:0.85em;">$1</code>')
        .replace(/\n/g, '<br>');
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); }

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    document.getElementById('sendBtn').disabled = !el.value.trim();
}

function showHistoryModal() {
    renderSessionList();
    document.getElementById('historyModal').classList.add('show');
}

function closeHistoryModal(event) {
    if (!event || event.target === document.getElementById('historyModal')) {
        document.getElementById('historyModal').classList.remove('show');
    }
}

function renderSessionList() {
    const list = document.getElementById('sessionList');
    if (!list) return;
    const ids = Object.keys(sessions).sort().reverse();
    if (!ids.length) {
        list.innerHTML = `<p style="text-align:center;padding:2rem;opacity:0.4;font-size:0.85rem;">Belum ada riwayat chat</p>`;
        return;
    }
    list.innerHTML = ids.map(id => {
        const s = sessions[id];
        const d = new Date(s.date);
        const dateStr = d.toLocaleDateString('id-ID', { day:'numeric', month:'short' });
        return `
            <div class="hist-item ${id === currentId ? 'active' : ''}" onclick="loadSession('${id}')">
                <div class="hist-icon"><i class="bi bi-chat-dots-fill"></i></div>
                <div class="hist-meta">
                    <div class="hist-name">${escapeHtml(s.title)}</div>
                    <div class="hist-date">${dateStr} · ${s.messages.length} pesan</div>
                </div>
                <button class="hist-del" onclick="event.stopPropagation(); deleteSession('${id}')" title="Hapus">
                    <i class="bi bi-trash3"></i>
                </button>
            </div>
        `;
    }).join('');
}

function deleteSession(id) {
    if (!confirm('Hapus chat ini?')) return;
    delete sessions[id];
    if (currentId === id) {
        currentId = null;
        localStorage.removeItem(STORAGE_KEY + '_current');
        const ids = Object.keys(sessions);
        if (ids.length > 0) {
            loadSession(ids.sort().reverse()[0]);
        } else {
            newSession();
        }
    }
    save();
    renderSessionList();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!document.getElementById('sendBtn').disabled) sendMessage();
    }
});

init();
</script>
{% endblock %}
