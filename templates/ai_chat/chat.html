{% extends 'base.html' %}
{% block title %}Chat AI - Sora LMS{% endblock %}

{% block extra_css %}
<style>
.chat-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 100px);
    margin: -1rem -2rem -2rem -2rem;
}

.chat-header {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--sora-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 100;
}

.chat-header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.chat-header-title {
    font-weight: 700;
    font-size: 1rem;
}

.chat-header-avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--sora-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.welcome-icon {
    width: 72px;
    height: 72px;
    border-radius: 24px;
    background: linear-gradient(135deg, var(--sora-primary), var(--sora-primary-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 2rem;
    margin-bottom: 1.25rem;
    box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
}

.welcome-title {
    font-size: 1.35rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
}

.welcome-text {
    opacity: 0.65;
    font-size: 0.95rem;
}

.welcome-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
}

.messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 2rem 6rem 2rem;
}

.msg {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1rem;
    max-width: 70%;
}

.msg-user {
    margin-left: auto;
    flex-direction: row-reverse;
}

.msg-avatar {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-weight: 600;
    font-size: 0.85rem;
}

.msg-avatar.ai {
    background: linear-gradient(135deg, var(--sora-primary), #6366f1);
    color: white;
}

.msg-avatar.user {
    background: var(--sora-card);
    border: 1px solid var(--sora-border);
}

.msg-avatar.user img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.msg-content {
    padding: 0.6rem 1rem;
    border-radius: 16px;
    font-size: 0.95rem;
}

.msg-user .msg-content {
    background: var(--sora-primary);
    color: white;
    border-bottom-right-radius: 4px;
}

.msg-ai .msg-content {
    background: var(--sora-card);
    border: 1px solid var(--sora-border);
    border-bottom-left-radius: 4px;
}

.input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1rem 1rem 1rem 296px;
    background: var(--sora-bg);
    border-top: 1px solid var(--sora-border);
    z-index: 50;
}

@media (max-width: 992px) {
    .input-area {
        padding-left: 1rem;
    }
}

.input-wrapper {
    max-width: 700px;
    margin: 0 auto;
    background: var(--sora-card);
    border: 1px solid var(--sora-border);
    border-radius: 24px;
    padding: 0.5rem 0.75rem;
    display: flex;
    align-items: flex-end;
}

.input-wrapper:focus-within {
    border-color: var(--sora-primary);
}

.input-wrapper {
    max-width: 800px;
    margin: 0 auto;
    background: var(--sora-card);
    border: 1px solid var(--sora-border);
    border-radius: 20px;
    padding: 0.5rem 0.75rem;
    display: flex;
    align-items: flex-end;
}

.input-wrapper:focus-within {
    border-color: var(--sora-primary);
}

#chatInput {
    flex: 1;
    border: none;
    background: transparent;
    padding: 0.5rem;
    resize: none;
    outline: none;
    font-size: 0.95rem;
    max-height: 100px;
    color: var(--sora-text);
}

#chatInput::placeholder {
    color: var(--sora-text);
    opacity: 0.5;
}

.btn-send {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--sora-primary);
    color: white;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
}

.btn-send:disabled { opacity: 0.3; }

.btn-send:not(:disabled):hover { transform: scale(1.1); }

.history-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--sora-text);
    padding: 0.5rem;
}

.history-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    animation: fadeIn 0.2s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.history-modal.show { display: flex; }

.history-modal-content {
    background: var(--sora-card);
    border: none;
    border-radius: 20px;
    width: 90%;
    max-width: 360px;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp 0.25s ease-out;
}

@keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.history-modal-header {
    padding: 1rem 1.25rem;
    background: linear-gradient(135deg, var(--sora-primary), var(--sora-primary-dark));
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
}

.history-modal-close {
    background: rgba(255,255,255,0.2);
    border: none;
    cursor: pointer;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 8px;
}

.history-modal-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
}

.history-modal-item {
    padding: 0.75rem 1rem;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.history-modal-item .btn-delete-session {
    opacity: 0.8;
    background: #fecaca;
    border: 1px solid #f87171;
    color: #991b1b;
    padding: 0.25rem 0.5rem;
    border-radius: 6px;
    transition: all 0.2s;
}

.history-modal-item:hover {
    background: rgba(99, 102, 241, 0.15);
}

.history-modal-item.active {
    background: var(--sora-primary);
    color: white;
}

.btn-new-chat {
    background: var(--sora-primary);
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.btn-new-chat:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.typing-indicator {
    display: flex;
    gap: 0.5rem;
    padding: 0.6rem 1rem;
    background: var(--sora-card);
    border: 1px solid var(--sora-border);
    border-radius: 16px;
}

.typing-dot {
    width: 8px;
    height: 8px;
    background: var(--sora-text);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }

.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
}
</style>
{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="history-modal" id="historyModal" onclick="closeHistoryModal(event)">
        <div class="history-modal-content" onclick="event.stopPropagation()">
            <div class="history-modal-header">
                <span>Riwayat Chat</span>
                <button class="history-modal-close" onclick="closeHistoryModal()">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="history-modal-list" id="sessionList"></div>
        </div>
    </div>

    

    <div class="messages-area" id="chatMessages"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="chatInput" rows="1" placeholder="Tanyakan materi atau tugas sulit..." oninput="autoResize(this)"></textarea>
            <button id="sendBtn" class="btn-send" onclick="sendMessage()" disabled>
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const USER_ID = "{{ request.user.pk }}";
const STORAGE_KEY = `sora_ai_v2_${USER_ID}`;

let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let currentId = localStorage.getItem(STORAGE_KEY + '_current') || null;
const USER_AVATAR = "{% if user.avatar %}{{ user.avatar.url }}{% else %}false{% endif %}";
const USER_NAME = "{{ user.username|escapejs }}";
const USER_INITIAL = "{{ user.username|slice:":1"|upper }}";

console.log('User avatar:', USER_AVATAR);
console.log('User name:', USER_NAME);
console.log('User initial:', USER_INITIAL);

function init() {
    const ids = Object.keys(sessions);
    if (currentId && sessions[currentId]) {
        loadSession(currentId);
    } else if (ids.length > 0) {
        loadSession(ids.sort().reverse()[0]);
    } else {
        newSession();
    }
    renderSessionList();
}

function newSession() {
    if (Object.keys(sessions).length >= 3) {
        alert('Maksimal 3 chat history. Hapus chat lama terlebih dahulu.');
        return;
    }
    const id = 'sess_' + Date.now();
    sessions[id] = { title: 'Chat Baru', messages: [], date: new Date().toISOString() };
    save();
    loadSession(id);
    closeHistoryModal();
}

function loadSession(id) {
    currentId = id;
    localStorage.setItem(STORAGE_KEY + '_current', id);
    renderMessages();
    renderSessionList();
    closeHistoryModal();
}

function renderMessages() {
    const box = document.getElementById('chatMessages');
    const msgs = sessions[currentId].messages;

    if (!msgs || msgs.length === 0) {
        box.innerHTML = `
            <div class="welcome-area">
                <div class="welcome-icon"><i class="bi bi-stars"></i></div>
                <div class="welcome-title">Ada yang bisa Sora bantu?</div>
                <div class="welcome-text">Tanyakan soal matematika, coding, atau rangkuman materi.</div>
            </div>
        `;
        return;
    }

    box.innerHTML = msgs.map(m => `
        <div class="msg ${m.role === 'user' ? 'msg-user' : 'msg-ai'}">
            <div class="msg-avatar ${m.role === 'user' ? 'user' : 'ai'}">
                ${m.role === 'user' 
                    ? (USER_AVATAR !== 'false' 
                        ? `<img src="${USER_AVATAR}" alt="${USER_NAME}">`
                        : USER_INITIAL)
                    : '<i class="bi bi-stars"></i>'}
            </div>
            <div class="msg-content">${formatContent(m.content)}</div>
        </div>
    `).join('');

    box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    const sess = sessions[currentId];
    sess.messages.push({ role: 'user', content: text });
    if (sess.title === 'Chat Baru') sess.title = text.substring(0, 25) + '...';

    input.value = '';
    input.style.height = 'auto';
    renderMessages();
    save();

    const box = document.getElementById('chatMessages');
    const typing = document.createElement('div');
    typing.className = 'msg msg-ai';
    typing.innerHTML = `
        <div class="msg-avatar"><i class="bi bi-stars"></i></div>
        <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    `;
    box.appendChild(typing);
    box.scrollTop = box.scrollHeight;

    try {
        const response = await fetch('{% url "ai_chat:chat_api" %}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify({ messages: sess.messages })
        });
        const data = await response.json();
        typing.remove();
        if (data.error) {
            sess.messages.push({ role: 'assistant', content: 'Error: ' + data.error });
        } else {
            sess.messages.push({ role: 'assistant', content: data.reply });
        }
    } catch (e) {
        typing.remove();
        sess.messages.push({ role: 'assistant', content: 'Maaf, terjadi gangguan koneksi ke AI. Error: ' + e.message });
    }

    save();
    renderMessages();
}

function formatContent(t) {
    if (!t) return '';
    return t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
            .replace(/```([\s\S]*?)```/g, '<pre style="background:#1e293b;color:#e2e8f0;padding:0.5rem;border-radius:8px;margin-top:0.5rem;"><code>$1</code></pre>')
            .replace(/\n/g, '<br>');
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); }

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
    document.getElementById('sendBtn').disabled = !el.value.trim();
}

function showHistoryModal() {
    document.getElementById('historyModal').classList.add('show');
}

function closeHistoryModal(event) {
    if (!event || event.target === document.getElementById('historyModal')) {
        document.getElementById('historyModal').classList.remove('show');
    }
}

function renderSessionList() {
    const list = document.getElementById('sessionList');
    if (!list) return;
    list.innerHTML = Object.keys(sessions).sort().reverse().map(id => `
        <div class="history-modal-item ${id === currentId ? 'active' : ''}" onclick="loadSession('${id}')">
            <div class="d-flex align-items-center gap-2 flex-grow-1" style="overflow: hidden;">
                <i class="bi bi-chat-dots-fill"></i>
                <span class="truncate" style="flex:1;min-width:0;">${escapeHtml(sessions[id].title)}</span>
            </div>
            <button class="btn-delete-session" onclick="event.stopPropagation(); deleteSession('${id}')" title="Hapus">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    `).join('');
}

function deleteSession(id) {
    if (!confirm('Hapus chat ini?')) return;
    delete sessions[id];
    if (currentId === id) {
        currentId = null;
        localStorage.removeItem(STORAGE_KEY + '_current');
        const ids = Object.keys(sessions);
        if (ids.length > 0) {
            loadSession(ids.sort().reverse()[0]);
        } else {
            newSession();
        }
    }
    save();
    renderSessionList();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.getElementById('chatInput').addEventListener('keypress', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

init();
</script>
{% endblock %}
