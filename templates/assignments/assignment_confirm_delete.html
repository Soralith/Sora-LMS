{% extends 'base.html' %}
{% block title %}Hapus Tugas - Sora LMS{% endblock %}
{% block page_title %}Hapus Tugas{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="sora-card">
            <div class="card-body-sora text-center py-5">
                <div style="width:64px;height:64px;border-radius:50%;background:#fee2e2;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.75rem;">⚠️</div>
                <h5 class="fw-700 mb-2">Hapus Tugas?</h5>
                <p class="text-muted mb-4">
                    Anda akan menghapus tugas <strong>{{ assignment.title }}</strong>.
                    Semua pengumpulan siswa akan ikut terhapus.
                </p>
                <form method="post" class="d-flex gap-3 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash me-2"></i>Ya, Hapus
                    </button>
                    <a href="{% url 'assignments:assignment_detail' pk=assignment.pk %}" class="btn btn-outline-secondary px-4">Batal</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
